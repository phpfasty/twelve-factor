services:
  php:
    image: webdevops/php:8.4-alpine
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/var/www/html
      - ./${PHP_INI_FILE:-php.ini}:/opt/docker/etc/php/php.ini
      - ./${APCU_INI_FILE:-apcu.ini}:/opt/docker/etc/php/conf.d/apcu.ini
    healthcheck:
      test: ["CMD", "sh", "-lc", "php -m | grep -q apcu"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    restart: unless-stopped
